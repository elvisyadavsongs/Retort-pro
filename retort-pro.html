<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Retort Pro — Production Control System</title>
<style>
:root{
  --bg:#050a0e;--bg2:#080f14;--bg3:#0c151d;--bg4:#111d26;
  --border:#1a3040;--borderG:#0d6e3a;
  --g:#00ff88;--g2:#00cc6a;--g3:#004d28;--gd:rgba(0,255,136,.08);
  --b:#00b4ff;--b2:#0088cc;--bd:rgba(0,180,255,.08);
  --r:#ff3355;--rd:rgba(255,51,85,.08);
  --y:#ffcc00;--yd:rgba(255,204,0,.08);
  --o:#ff7700;--od:rgba(255,119,0,.08);
  --pu:#aa44ff;--pud:rgba(170,68,255,.08);
  --gold:#f59e0b;
  --text:#c8e6d0;--sub:#4a7060;--dim:#0a1a10;
  --font:'JetBrains Mono','Fira Code','Courier New',monospace;
  --sans:'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
body{overflow-x:hidden;}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--g3);border-radius:2px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--borderG);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;transition:transform .25s;}
.main{margin-left:240px;padding:20px;min-height:100vh;max-width:100%;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.8);}.main{margin-left:0;}}

/* SIDEBAR */
.sb-logo{padding:16px;border-bottom:1px solid var(--borderG);display:flex;align-items:center;gap:10px;}
.sb-icon{width:38px;height:38px;border-radius:10px;background:var(--gd);border:1.5px solid var(--g3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:.5px;line-height:1.2;}
.sb-sub{font-size:9px;color:var(--sub);margin-top:1px;font-family:var(--font);letter-spacing:1px;}
.user-chip{margin:10px 12px 0;padding:8px 10px;border-radius:10px;border:1px solid var(--borderG);background:var(--gd);display:flex;align-items:center;gap:8px;}
.user-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.user-name{font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-role{font-size:9px;font-family:var(--font);letter-spacing:.5px;}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;border-left:2.5px solid transparent;color:var(--sub);font-size:13px;font-weight:500;transition:all .15s;user-select:none;}
.nav-item:hover{color:var(--g);background:var(--gd);}
.nav-item.active{color:var(--g);background:var(--gd);border-left-color:var(--g);font-weight:700;}
.nav-item .ni{font-size:14px;opacity:.7;}
.nav-item.active .ni{opacity:1;}
.nav-dot{margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);}
.sb-bottom{padding:12px;border-top:1px solid var(--borderG);}
.plan-badge{padding:8px 10px;border-radius:9px;text-align:center;cursor:pointer;margin-bottom:8px;font-size:11px;font-weight:700;border:1px solid;}
.logout-btn{width:100%;padding:8px;border-radius:9px;background:transparent;border:1px solid var(--border);color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans);}
.logout-btn:hover{border-color:var(--r);color:var(--r);}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;}
.page-date{font-size:11px;color:var(--sub);margin-top:2px;font-family:var(--font);}
.hamburger{display:none;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:16px;}
@media(max-width:768px){.hamburger{display:block;}}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
.card.glow-g{border-color:var(--g3);box-shadow:0 0 24px rgba(0,255,136,.06);}
.card.glow-b{border-color:var(--b2);box-shadow:0 0 24px rgba(0,180,255,.06);}
.card.glow-o{border-color:var(--o);box-shadow:0 0 24px rgba(255,119,0,.06);}
.card.glow-r{border-color:var(--r);box-shadow:0 0 24px rgba(255,51,85,.06);}
.card.glow-pu{border-color:var(--pu);box-shadow:0 0 24px rgba(170,68,255,.06);}
.card.glow-gold{border-color:var(--gold);box-shadow:0 0 24px rgba(245,158,11,.06);}

.sec-head{display:flex;align-items:center;gap:7px;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.sec-head span{font-size:11px;font-weight:800;letter-spacing:2.5px;color:var(--b);text-transform:uppercase;font-family:var(--font);}

/* GRID */
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.row-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* KPI CARDS */
.kpi{position:relative;overflow:hidden;cursor:default;transition:transform .2s,box-shadow .2s;}
.kpi:hover{transform:translateY(-3px);}
.kpi-icon{position:absolute;right:-5px;top:-5px;font-size:32px;opacity:.07;}
.kpi-bar{position:absolute;bottom:0;left:0;right:0;height:2.5px;border-radius:0 0 14px 14px;}
.kpi-label{font-size:10px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;font-family:var(--font);margin-bottom:8px;}
.kpi-val{font-size:36px;font-weight:900;line-height:1;font-family:var(--font);font-variant-numeric:tabular-nums;}
.kpi-sub{font-size:10px;color:var(--sub);margin-top:4px;}

/* BUTTONS */
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:var(--sans);transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--b),#0066aa);color:#fff;box-shadow:0 4px 16px rgba(0,180,255,.2);}
.btn-green{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;box-shadow:0 4px 16px rgba(0,255,136,.2);}
.btn-red{background:linear-gradient(135deg,var(--r),#cc0033);color:#fff;}
.btn-yellow{background:linear-gradient(135deg,var(--y),#cc9900);color:#000;}
.btn-purple{background:linear-gradient(135deg,var(--pu),#7700cc);color:#fff;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b45309);color:#fff;}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--g3);}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px;}

/* FORM */
.fld-label{font-size:10px;color:var(--sub);margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;font-family:var(--font);}
.inp{background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--text);font-size:13px;width:100%;outline:none;box-sizing:border-box;font-family:var(--sans);transition:border-color .15s;}
.inp:focus{border-color:var(--g);}
.inp-wrap{position:relative;}
.inp-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.45;pointer-events:none;}
.inp-wrap .inp{padding-left:36px;}
select.inp{background:rgba(0,0,0,.5);}
option{background:#0c151d;}

/* BADGE */
.badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;font-family:var(--font);}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:rgba(0,0,0,.4);color:var(--sub);padding:9px 11px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:var(--font);}
.tbl td{padding:9px 11px;border-bottom:1px solid rgba(26,48,64,.4);vertical-align:middle;}
.tbl tr:hover td{background:rgba(0,255,136,.02);}
.tbl-wrap{overflow-x:auto;}

/* ALERTS */
.alert{padding:10px 16px;border-radius:11px;margin-bottom:10px;display:flex;gap:10px;align-items:center;border:1px solid;}

/* LIVE GRAPH */
.graph-wrap{position:relative;width:100%;}

/* TIMER */
.timer-btn{padding:5px 13px;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;font-family:var(--font);letter-spacing:.5px;transition:all .18s;}
.timer-running{font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:7px;}

/* PROGRESS BAR */
.prog{height:5px;background:var(--dim);border-radius:3px;overflow:hidden;}
.prog-inner{height:100%;border-radius:3px;transition:width .5s;}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,255,136,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(0,180,255,.05) 0%,transparent 50%);
}
.login-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
.login-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--borderG);border-radius:18px;padding:32px 28px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,255,136,.06),0 20px 60px rgba(0,0,0,.6);}
.login-logo{text-align:center;margin-bottom:28px;}
.logo-3d{display:flex;justify-content:center;margin-bottom:12px;}
.login-title{font-size:22px;font-weight:900;color:var(--text);margin-bottom:3px;}
.login-sub{font-size:12px;color:var(--sub);font-family:var(--font);letter-spacing:.5px;}
.login-badge{display:inline-block;margin-top:10px;background:rgba(0,255,136,.08);border:1px solid var(--g3);border-radius:20px;padding:3px 14px;font-size:9px;color:var(--g);letter-spacing:2px;font-weight:700;font-family:var(--font);text-transform:uppercase;}
.quick-login{margin-top:14px;background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);padding:10px;}
.ql-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer;transition:background .15s;}
.ql-item:hover{background:rgba(0,255,136,.04);}
.ql-av{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;}

/* ONBOARDING */
.ob-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;background-image:radial-gradient(ellipse at 30% 50%,rgba(0,180,255,.06) 0%,transparent 50%);}
.ob-card{width:100%;max-width:500px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px 24px;position:relative;z-index:1;}
.steps-bar{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:22px;}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:var(--font);flex-shrink:0;transition:all .25s;}
.step-line{flex:1;height:2px;max-width:32px;border-radius:1px;transition:background .25s;}
.step-name{font-size:9px;margin-top:3px;font-family:var(--font);text-align:center;}

/* SUBSCRIPTION CARDS */
.plan-card{padding:22px;border-radius:16px;cursor:pointer;position:relative;overflow:hidden;transition:all .22s;border:1.5px solid var(--border);}
.plan-card.selected{border-width:2px;transform:scale(1.02);}
.plan-popular{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--pu),#5500aa);color:#fff;font-size:8px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:1px;font-family:var(--font);}
.plan-active{position:absolute;background:var(--g);color:#000;font-size:8px;font-weight:800;padding:3px 9px;border-radius:20px;font-family:var(--font);}

/* SETTINGS */
.settings-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg3);border-radius:12px;padding:4px;border:1px solid var(--border);}
.st-tab{flex:1;padding:8px 10px;text-align:center;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);transition:all .15s;white-space:nowrap;}
.st-tab.active{background:var(--gd);color:var(--g);font-weight:700;border:1px solid var(--g3);}

/* UTILITY */
.mono{font-family:var(--font);}
.green{color:var(--g)}.blue{color:var(--b)}.red{color:var(--r)}.yellow{color:var(--y)}.orange{color:var(--o)}.purple{color:var(--pu)}.gold{color:var(--gold)}.sub{color:var(--sub);}
.gap-8{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.gap-12{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.full{width:100%;}
.mt-12{margin-top:12px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}
.text-c{text-align:center;}
.fw-800{font-weight:800;}.fw-700{font-weight:700;}
.err-msg{color:var(--r);font-size:11px;margin-top:4px;font-family:var(--font);}
.ok-msg{color:var(--g);font-size:11px;margin-top:4px;font-family:var(--font);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.icon-picker{display:flex;gap:7px;flex-wrap:wrap;}
.icon-pick{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid var(--border);background:var(--dim);transition:all .15s;}
.icon-pick.selected{border-color:var(--g);background:var(--gd);}
.color-pick{width:28px;height:28px;border-radius:7px;cursor:pointer;transition:all .15s;border:3px solid transparent;}
.color-pick.selected{border-color:#fff;box-shadow:0 0 10px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:199;backdrop-filter:blur(3px);}
.overlay.show{display:block;}
.ob-btn-row{display:flex;gap:10px;}
input[type=range]{accent-color:var(--g);}
</style>
</head>
<body>

<!-- ══════════════════════ LOGIN ══════════════════════ -->
<div id="loginPage" class="login-wrap">
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-3d">
        <svg width="64" height="64" viewBox="0 0 64 64" id="loginLogo3D">
          <defs>
            <radialGradient id="sg1" cx="38%" cy="32%"><stop offset="0%" stop-color="#00ff88" stop-opacity=".9"/><stop offset="100%" stop-color="#003322" stop-opacity=".3"/></radialGradient>
            <filter id="sf1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <ellipse cx="32" cy="32" rx="23" ry="9" fill="none" stroke="#00ff88" stroke-width=".6" stroke-opacity=".15" stroke-dasharray="3 5"/>
          <ellipse cx="32" cy="32" rx="23" ry="9" fill="none" stroke="rgba(0,255,136,.1)" stroke-width=".6"/>
          <ellipse cx="32" cy="32" rx="14" ry="5.5" fill="none" stroke="rgba(0,180,255,.1)" stroke-width=".6" transform="rotate(55 32 32)"/>
          <circle id="ob1" cx="55" cy="32" r="2.5" fill="#00ff88" filter="url(#sf1)"/>
          <circle id="ob2" cx="9" cy="32" r="2.5" fill="#00ff88" filter="url(#sf1)"/>
          <circle id="ob3" cx="32" cy="9" r="2.5" fill="#00ff88" filter="url(#sf1)"/>
          <circle cx="33" cy="33" r="7.5" fill="rgba(0,255,136,.08)" filter="url(#sf1)"/>
          <circle cx="32" cy="32" r="7" fill="url(#sg1)" filter="url(#sf1)"/>
          <circle cx="29.5" cy="29.5" r="2.5" fill="rgba(255,255,255,.25)"/>
          <line x1="27" y1="31" x2="37" y2="31" stroke="rgba(0,255,136,.5)" stroke-width=".6"/>
          <line x1="27" y1="32.5" x2="37" y2="32.5" stroke="rgba(0,255,136,.5)" stroke-width=".6"/>
          <line x1="27" y1="34" x2="37" y2="34" stroke="rgba(0,255,136,.5)" stroke-width=".6"/>
          <rect x="28.5" y="22.5" width="7" height="3" rx="1.5" fill="rgba(0,255,136,.2)" stroke="rgba(0,255,136,.4)" stroke-width=".5"/>
        </svg>
      </div>
      <div id="loginCompanyName" class="login-title">Retort Pro</div>
      <div id="loginCompanyTag" class="login-sub">Production Control System</div>
      <div class="login-badge">ENTERPRISE EDITION</div>
    </div>
    <div class="mb-12">
      <div class="fld-label">Username</div>
      <div class="inp-wrap"><span class="inp-icon">▶</span><input class="inp" id="loginUser" placeholder="enter username" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <div class="mb-16" style="position:relative">
      <div class="fld-label">Password</div>
      <div class="inp-wrap" style="position:relative">
        <span class="inp-icon">🔒</span>
        <input class="inp" id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:38px"/>
        <button onclick="togglePw('loginPass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--sub);font-size:13px;padding:0">👁</button>
      </div>
    </div>
    <div id="loginErr" class="err-msg mb-12" style="display:none"></div>
    <button class="btn btn-green full" onclick="doLogin()">SIGN IN ▶</button>
    <div id="quickLoginBox" class="quick-login mt-12" style="display:none">
      <div style="font-size:9px;color:var(--sub);margin-bottom:6px;letter-spacing:1px;font-family:var(--font);text-transform:uppercase">Quick Login</div>
      <div id="quickLoginList"></div>
    </div>
    <div style="margin-top:14px;text-align:center;font-size:11px;color:var(--sub)">
      New company? <span style="color:var(--b);cursor:pointer;font-weight:700;border-bottom:1px solid rgba(0,180,255,.4)" onclick="showPage('onboarding')">Register Karo →</span>
    </div>
  </div>
</div>

<!-- ══════════════════════ ONBOARDING ══════════════════════ -->
<div id="onboardingPage" style="display:none" class="ob-wrap">
  <div class="ob-card">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:20px;font-weight:900;color:var(--text)">Retort Pro Enterprise</div>
      <div style="font-size:11px;color:var(--sub);margin-top:3px;font-family:var(--font)">Company Register Karo — Free Mein Shuru Karo</div>
    </div>
    <!-- Steps bar -->
    <div class="steps-bar" id="stepsBar"></div>
    <!-- Steps content -->
    <div id="obContent"></div>
    <div style="margin-top:16px;text-align:center;font-size:11px;color:var(--sub)">
      Already account hai? <span style="color:var(--g);cursor:pointer;font-weight:700" onclick="showPage('login')">Login Karo →</span>
    </div>
  </div>
</div>

<!-- ══════════════════════ MAIN APP ══════════════════════ -->
<div id="appPage" style="display:none" class="app">
  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-icon" id="sbIcon">⚙</div>
      <div>
        <div class="sb-title" id="sbName">Retort Pro</div>
        <div class="sb-sub" id="sbTag">PRODUCTION SYSTEM</div>
      </div>
    </div>
    <div class="user-chip">
      <div class="user-av" id="userAv" style="background:var(--gd);color:var(--g);border:1px solid var(--g3)">A</div>
      <div>
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role mono" id="userRole" style="color:var(--g)">Owner</div>
      </div>
    </div>
    <div class="sb-nav" id="navList"></div>
    <div class="sb-bottom">
      <div class="plan-badge" id="planBadge" onclick="navigate('plans')" style="border-color:var(--g3);color:var(--g);background:var(--gd)">⚡ Pro Plan — Upgrade</div>
      <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
      </div>
      <div>
        <div class="page-title" id="pageTitle">📊 Dashboard</div>
        <div class="page-date" id="pageDate"></div>
      </div>

function rcColor(r){return r==='Owner'?'#f59e0b':r==='Admin'?'#aa44ff':r==='Supervisor'?'#00b4ff':'#00ff88';}
function getZone(val,product){
  const f=parseFloat(val);if(isNaN(f)||!val) return null;
  const r=(STATE.ranges||[]).find(r=>r.product.toLowerCase()===(product||'').toLowerCase());
  if(!r) return{zone:'unknown',color:'#4a7060',label:'Range not set',icon:'?'};
  if(f<r.min) return{zone:'risk',color:'#ff3355',label:`RISK — below ${r.min}`,icon:'⚠'};
  if(f>r.max) return{zone:'overheat',color:'#ffcc00',label:`OVERHEAT — above ${r.max}`,icon:'🔥'};
  return{zone:'safe',color:'#00ff88',label:`Safe (${r.min}–${r.max})`,icon:'✓'};
}
function fmtT(d){if(!d) return '—';return new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fmtD(d){if(!d) return '—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function strip(s){return(s||'').replace('__END','');}
function elapStr(s,e){
  if(!s) return null;
  const ms=(e?new Date(e):new Date())-new Date(s);
  if(ms<0) return '0s';
  const sc=Math.floor(ms/1000)%60,m=Math.floor(ms/60000)%60,h=Math.floor(ms/3600000);
  return h>0?`${h}h ${m}m`:m>0?`${m}m ${sc}s`:`${sc}s`;
}

}

function initLiveTemp(){
  const base=parseFloat(STATE.batches?.slice(-1)[0]?.temperature)||121;
  STATE.tempData=Array.from({length:30},(_,i)=>({temp:base+Math.sin(i*.4)*3+(Math.random()-.5)*2,pres:1.1+Math.sin(i*.3)*.05+(Math.random()-.5)*.02}));
  if(STATE.liveInterval) clearInterval(STATE.liveInterval);
  STATE.liveInterval=setInterval(()=>{
    const last=STATE.tempData[STATE.tempData.length-1];
    STATE.tempData=[...STATE.tempData.slice(-49),{temp:Math.max(100,Math.min(135,last.temp+(Math.random()-.48)*1.5)),pres:Math.max(.8,Math.min(1.5,last.pres+(Math.random()-.48)*.02))}];
    if(STATE.currentPage==='dashboard') updateLiveGraph();
  },1500);
}
function updateLiveGraph(){
  const el=document.getElementById('liveGraph');
  if(!el) return;
  const d=STATE.tempData,H=130,W=600;
  const temps=d.map(x=>x.temp),press=d.map(x=>x.pres);
  const minT=Math.min(...temps)-2,maxT=Math.max(...temps)+2,rT=maxT-minT||1;
  const minP=Math.min(...press)-.05,maxP=Math.max(...press)+.05,rP=maxP-minP||1;
  const tPts=temps.map((v,i)=>`${(i/(temps.length-1))*W},${H-4-((v-minT)/rT)*(H-8)}`).join(' ');
  const pPts=press.map((v,i)=>`${(i/(press.length-1))*W},${H-4-((v-minP)/rP)*(H-8)}`).join(' ');
  const lastT=temps[temps.length-1].toFixed(1);
  const lastP=press[press.length-1].toFixed(3);
  const dotY=H-4-((temps[temps.length-1]-minT)/rT)*(H-8);
  const lineY=H-4-((121-minT)/rT)*(H-8);
  const trend=temps.length>5?(temps[temps.length-1]>temps[temps.length-5]?'↑↑':'↓↓'):'——';
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g)"></div>
        <span class="mono" style="font-size:10px;color:var(--b);letter-spacing:2px">LIVE TEMPERATURE & PRESSURE</span>
      </div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div style="text-align:center">
          <div class="mono" style="font-size:24px;font-weight:900;color:var(--o);line-height:1">${lastT}°C</div>
          <div class="mono" style="font-size:9px;color:var(--sub)">TEMP ${trend}</div>
        </div>
        <div style="width:1px;height:30px;background:var(--border)"></div>
        <div style="text-align:center">
          <div class="mono" style="font-size:24px;font-weight:900;color:#00eeff;line-height:1">${lastP}</div>
          <div class="mono" style="font-size:9px;color:var(--sub)">bar</div>
        </div>
      </div>
    </div>
    <div style="position:relative;height:${H}px">
      <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        ${[.25,.5,.75].map(f=>`<line x1="0" y1="${H*f}" x2="${W}" y2="${H*f}" stroke="rgba(0,255,136,0.05)" stroke-width="1"/>`).join('')}
        <polygon points="0,${H} ${pPts} ${W},${H}" fill="rgba(0,238,255,0.04)"/>
        <polyline points="${pPts}" fill="none" stroke="#00eeff" stroke-width="1.5" stroke-opacity=".5" stroke-dasharray="5 3"/>
        <polygon points="0,${H} ${tPts} ${W},${H}" fill="rgba(255,119,0,0.06)"/>
        <polyline points="${tPts}" fill="none" stroke="var(--o)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${W}" cy="${dotY}" r="4.5" fill="var(--o)" stroke="rgba(255,119,0,.3)" stroke-width="5"/>
        <line x1="0" y1="${lineY}" x2="${W}" y2="${lineY}" stroke="var(--g)" stroke-width="1" stroke-dasharray="6 3" stroke-opacity=".5"/>
        <text x="4" y="${Math.max(10,lineY-4)}" fill="var(--g)" font-size="8" opacity=".7">121°C Target</text>
      </svg>
      <div style="position:absolute;bottom:0;right:0;display:flex;gap:12px;font-size:10px">
        <span style="color:var(--o);display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:2px;background:var(--o);border-radius:1px"></span>Temperature</span>
        <span style="color:#00eeff;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:0;border-top:2px dashed #00eeff"></span>Pressure</span>
      </div>
    </div>`;
}

        </div>`;}).join('')}
      </div>
    </div>

    <!-- F0 GAUGES -->
    ${(STATE.ranges||[]).length>0?`
    <div class="card glow-b mb-16">
      <div class="sec-head"><span>F0 SAFETY MONITOR — PRODUCT WISE</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">

                ${pb.length>0?`<div style="margin-top:8px;font-size:10px;color:var(--sub)">${pct}% Safe Rate<div class="prog mt-12" style="width:80px"><div class="prog-inner" style="width:${pct}%;background:linear-gradient(90deg,var(--g),var(--b))"></div></div></div>`:''}

        ${[...b].reverse().slice(0,8).map(b2=>{const z2=getZone(b2.f0,b2.product);return`<tr>
          <td style="color:var(--sub);font-size:11px">${fmtD(b2.date)}</td>
          <td><span class="mono" style="color:var(--b);font-weight:700">${b2.batchNo}</span></td>

          <td><span class="badge" style="background:${b2.status==='Completed'?'rgba(0,255,136,.12)':b2.status==='Failed'?'rgba(255,51,85,.12)':'rgba(255,119,0,.12)'};color:${b2.status==='Completed'?'var(--g)':b2.status==='Failed'?'var(--r)':'var(--o)'};border:1px solid ${b2.status==='Completed'?'rgba(0,255,136,.25)':b2.status==='Failed'?'rgba(255,51,85,.25)':'rgba(255,119,0,.25)'}">${b2.status}</span></td>
        </tr>`;}).join('')}
      </tbody></table></div>`}
    </div>`;

  // Clock update
  if(STATE.clockInterval) clearInterval(STATE.clockInterval);
  STATE.clockInterval=setInterval(()=>{const el=document.getElementById('heroClockDash');if(el)el.textContent=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
  updateLiveGraph();
}

const emptyB=()=>({id:uid(),date:new Date().toISOString().slice(0,10),batchNo:'',product:'',quantity:'',retortNo:'',retortStart:'',retortEnd:'',comeUpStart:'',comeUpEnd:'',holdingStart:'',holdingEnd:'',coolingStart:'',coolingEnd:'',temperature:'',pressure:'',f0:'',status:'Running',remarks:''});

function renderBatch(){
  const batches=STATE.batches||[];
  const form=STATE.batchForm||emptyB();
  const dur=form.retortStart&&form.retortEnd?elapStr(strip(form.retortStart),strip(form.retortEnd)):null;
  const z=getZone(form.f0,form.product);
  document.getElementById('pg-batch').innerHTML=`
  <div class="card glow-${STATE.batchEditIdx!==null?'gold':'b'}">
    <div class="sec-head"><span>${STATE.batchEditIdx!==null?'✏ EDIT BATCH':'⊞ NEW BATCH ENTRY'}</span></div>
    <div class="grid-2 mb-16">
      ${[['date','Date','date'],['batchNo','Batch Number','text'],['product','Product Name','text'],['quantity','Quantity (kg)','number'],['retortNo','Retort Number','text']].map(([k,l,t])=>`
      <div><div class="fld-label">${l}</div><input class="inp" type="${t}" id="bf_${k}" value="${form[k]||''}" oninput="STATE.batchForm.${k}=this.value;if('${k}'==='f0'||'${k}'==='product')updateF0Alert()"/></div>`).join('')}
    </div>
    <!-- Retort Time -->
    <div class="card" style="border-color:var(--g3);background:rgba(0,255,136,.02);margin-bottom:16px">
      <div class="sec-head"><span>⏱ RETORT START & END TIME</span></div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end">
        ${renderTimerField('retortStart','RETORT START','#00b4ff',form)}
        ${renderTimerField('retortEnd','RETORT END','#ff7700',form)}
        ${dur?`<div><div class="fld-label">TOTAL DURATION</div><div class="mono" style="color:var(--g);background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);border-radius:9px;padding:6px 14px;font-weight:800;font-size:14px">⏱ ${dur}</div></div>`:''}
      </div>
    </div>
    <!-- Process Timings -->
    <div class="mb-16">
      <div class="sec-head"><span>PROCESS TIMINGS</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
        ${[['comeUpStart','Come Up START','#00b4ff'],['comeUpEnd','Come Up END','#00b4ff'],['holdingStart','Holding START','#ff7700'],['holdingEnd','Holding END','#ff7700'],['coolingStart','Cooling START','#aa44ff'],['coolingEnd','Cooling END','#aa44ff']].map(([k,l,c])=>renderTimerField(k,l,c,form)).join('')}
      </div>
    </div>
    <!-- Process Data -->
    <div class="mb-16">
      <div class="sec-head"><span>PROCESS DATA</span></div>
      <div class="grid-3">
        ${[['temperature','Temperature (°C)','number'],['pressure','Pressure (bar)','number']].map(([k,l,t])=>`<div><div class="fld-label">${l}</div><input class="inp" type="${t}" id="bf_${k}" value="${form[k]||''}" oninput="STATE.batchForm.${k}=this.value"/></div>`).join('')}
        <div><div class="fld-label">F0 Value</div><input class="inp" type="number" id="bf_f0" value="${form.f0||''}" style="border-color:${z?z.color+'60':'var(--border)'}" oninput="STATE.batchForm.f0=this.value;updateF0Alert()"/></div>
      </div>
      <div id="f0Alert" class="mt-12"></div>
    </div>
    <!-- Output -->
    <div class="mb-16">
      <div class="sec-head"><span>OUTPUT</span></div>
      <div class="grid-2">
        <div><div class="fld-label">Status</div>
          <select class="inp" id="bf_status" onchange="STATE.batchForm.status=this.value">
            ${['Running','Completed','Failed'].map(s=>`<option${form.status===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div><div class="fld-label">Remarks</div><input class="inp" id="bf_remarks" value="${form.remarks||''}" placeholder="Optional..." oninput="STATE.batchForm.remarks=this.value"/></div>
      </div>
    </div>
    <div class="gap-8">
      <button class="btn btn-green" onclick="saveBatch()">💾 ${STATE.batchEditIdx!==null?'Update Batch':'Save Batch'}</button>
      ${STATE.batchEditIdx!==null?`<button class="btn btn-ghost" onclick="STATE.batchEditIdx=null;STATE.batchForm=null;renderBatch()">Cancel</button>`:''}
      <span id="batchSaveOk" style="color:var(--g);font-weight:700;display:none">✓ Saved!</span>
    </div>
  </div>

  ${batches.length>0?`
  <div class="card">
    <div class="sec-head"><span>ALL BATCHES (${batches.length})</span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      ${['Date','Batch','Product','Qty','R.Start','R.End','Duration','F0','Status',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${batches.map((b2,i)=>{
        const dr=b2.retortStart&&b2.retortEnd?elapStr(strip(b2.retortStart),strip(b2.retortEnd)):'—';
        const z2=getZone(b2.f0,b2.product);
        return`<tr>
          <td style="color:var(--sub);font-size:11px">${fmtD(b2.date)}</td>
          <td><span class="mono" style="color:var(--b);font-weight:700">${b2.batchNo}</span></td>
          <td>${b2.product}</td>
          <td style="color:var(--sub)">${b2.quantity}</td>
          <td><span class="mono" style="color:var(--g);font-size:11px">${fmtT(strip(b2.retortStart))}</span></td>
          <td><span class="mono" style="color:var(--o);font-size:11px">${fmtT(strip(b2.retortEnd))}</span></td>
          <td><span class="mono" style="color:var(--y);font-weight:700;font-size:11px">${dr}</span></td>
          <td><span class="mono" style="font-weight:800;color:${z2?z2.color:'var(--sub)'}">${b2.f0||'—'}</span></td>
          <td><span class="badge" style="background:${b2.status==='Completed'?'rgba(0,255,136,.12)':b2.status==='Failed'?'rgba(255,51,85,.12)':'rgba(255,119,0,.12)'};color:${b2.status==='Completed'?'var(--g)':b2.status==='Failed'?'var(--r)':'var(--o)'};border:1px solid ${b2.status==='Completed'?'rgba(0,255,136,.25)':b2.status==='Failed'?'rgba(255,51,85,.25)':'rgba(255,119,0,.25)'}">${b2.status}</span></td>
          <td><div class="gap-8">
            <button class="btn btn-ghost btn-sm" onclick="editBatch(${i})">✏</button>
            <button class="btn btn-red btn-sm" onclick="deleteBatch(${i})">✕</button>
          </div></td>
        </tr>`;}).join('')}
    </tbody></table></div>
  </div>`:''}`;

  updateF0Alert();
  // Init timers display
  if(!STATE.batchForm) STATE.batchForm=emptyB();
}
function renderTimerField(k,label,color,form){
  const val=form[k]||'';const running=val&&!val.includes('__END');
  return`<div id="tf_${k}">
    <div class="fld-label" style="color:${color}99">${label}</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${!val?
        `<button class="timer-btn" style="border:1px solid ${color}50;background:${color}12;color:${color}" onclick="startTimer('${k}')">▶ Start</button>`:
        `<span class="timer-running mono" style="color:${color};background:${color}10;border:1px solid ${color}28">${fmtT(strip(val))}</span>
        ${running?`<span class="mono" style="font-size:11px;color:var(--g);background:rgba(0,255,136,.08);border-radius:6px;padding:3px 7px" id="elapsed_${k}">${elapStr(val)||'0s'}</span>
        <button class="timer-btn" style="border:1px solid rgba(255,51,85,.4);background:rgba(255,51,85,.1);color:var(--r)" onclick="stopTimer('${k}')">■ Stop</button>`:''}
        <button class="timer-btn btn-ghost" style="border:1px solid var(--border);background:transparent;color:var(--sub);padding:4px 8px;font-size:10px" onclick="clearTimer('${k}')">✕</button>`
      }
    </div>
  </div>`;
}
function startTimer(k){if(!STATE.batchForm)STATE.batchForm=emptyB();STATE.batchForm[k]=new Date().toISOString();renderBatch();startElapsedUpdate(k);}
function stopTimer(k){if(STATE.batchForm&&STATE.batchForm[k])STATE.batchForm[k]+=('__END');renderBatch();}
function clearTimer(k){if(STATE.batchForm)STATE.batchForm[k]='';renderBatch();}
function startElapsedUpdate(k){const iv=setInterval(()=>{const el=document.getElementById(`elapsed_${k}`);if(!el){clearInterval(iv);return;}const val=STATE.batchForm?.[k]||'';if(!val||val.includes('__END')){clearInterval(iv);return;}el.textContent=elapStr(val)||'0s';},1000);}
function updateF0Alert(){
  const el=document.getElementById('f0Alert');if(!el) return;
  const f0=STATE.batchForm?.f0||'',product=STATE.batchForm?.product||'';
  const z=getZone(f0,product);
  if(z&&f0){el.innerHTML=`<div style="display:inline-flex;gap:8px;align-items:center;background:${z.color}0a;border:1px solid ${z.color}28;border-radius:10px;padding:8px 14px"><span style="font-size:16px">${z.icon}</span><span style="color:${z.color};font-weight:700;font-size:13px">${z.label}</span></div>`;}
  else el.innerHTML='';
}
function saveBatch(){
  if(!STATE.batchForm)STATE.batchForm=emptyB();
  const f=STATE.batchForm;
  if(!f.batchNo||!f.product){alert('Batch No aur Product zaroori!');return;}
  if(STATE.batchEditIdx!==null){STATE.batches[STATE.batchEditIdx]={...f};STATE.batchEditIdx=null;}
  else STATE.batches.push({...f});
  saveBatches();STATE.batchForm=null;
  const ok=document.getElementById('batchSaveOk');if(ok){ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);}
  renderBatch();
}
function editBatch(i){STATE.batchEditIdx=i;STATE.batchForm={...STATE.batches[i]};renderBatch();window.scrollTo(0,0);}
function deleteBatch(i){if(window.confirm('Delete karo?')){STATE.batches.splice(i,1);saveBatches();renderBatch();}}

function renderReports(){
  const b=STATE.batches||[];
  document.getElementById('pg-reports').innerHTML=`
  <div class="card glow-b">
    <div class="sec-head"><span>FILTER REPORTS</span></div>
    <div class="gap-12 mb-16" style="flex-wrap:wrap;align-items:flex-end">
      <div><div class="fld-label">From Date</div><input class="inp" type="date" id="rptFrom" style="width:160px"/></div>
      <div><div class="fld-label">To Date</div><input class="inp" type="date" id="rptTo" style="width:160px"/></div>
      <div><div class="fld-label">Status</div><select class="inp" id="rptSt" style="width:140px"><option>All</option>${['Running','Completed','Failed'].map(s=>`<option>${s}</option>`).join('')}</select></div>
      <button class="btn btn-ghost" onclick="document.getElementById('rptFrom').value='';document.getElementById('rptTo').value='';document.getElementById('rptSt').value='All';filterReports()">Reset</button>
      <button class="btn btn-green" onclick="exportCSV()">📥 Export CSV</button>

  </div>
  <div class="card" id="rptResult"></div>`;
  filterReports();
  ['rptFrom','rptTo','rptSt'].forEach(id=>document.getElementById(id)?.addEventListener('change',filterReports));
}
function filterReports(){
  const from=document.getElementById('rptFrom')?.value,to=document.getElementById('rptTo')?.value,sf=document.getElementById('rptSt')?.value;
  const b=STATE.batches||[];
  const fil=b.filter(x=>{const d=new Date(x.date);if(from&&d<new Date(from))return false;if(to&&d>new Date(to))return false;if(sf&&sf!=='All'&&x.status!==sf)return false;return true;});
  const el=document.getElementById('rptResult');if(!el) return;
  if(fil.length===0){el.innerHTML=`<div class="sec-head"><span>RESULTS (0)</span></div><div style="text-align:center;padding:24px;color:var(--sub)">No results.</div>`;return;}
  el.innerHTML=`<div class="sec-head"><span>RESULTS (${fil.length})</span></div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr>${['Date','Batch','Product','Qty','Retort','R.Start','R.End','Duration','Temp','F0','Zone','Status'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>
  ${fil.map(b2=>{const z=getZone(b2.f0,b2.product),dr=b2.retortStart&&b2.retortEnd?elapStr(strip(b2.retortStart),strip(b2.retortEnd)):'—';return`<tr>
    <td style="color:var(--sub);font-size:11px">${fmtD(b2.date)}</td>
    <td><span class="mono" style="color:var(--b);font-weight:700">${b2.batchNo}</span></td>
    <td>${b2.product}</td><td style="color:var(--sub)">${b2.quantity}kg</td><td style="color:var(--sub)">${b2.retortNo}</td>
    <td><span class="mono" style="color:var(--g);font-size:11px">${fmtT(strip(b2.retortStart))}</span></td>
    <td><span class="mono" style="color:var(--o);font-size:11px">${fmtT(strip(b2.retortEnd))}</span></td>

function saveUserForm(){
  const name=document.getElementById('uf_name')?.value?.trim();

  const password=document.getElementById('uf_password')?.value;
  const role=document.getElementById('uf_role')?.value;

  if(!name||!username||!password){errEl.textContent='⚠ Saare fields zaroori!';return;}
  if(password.length<4){errEl.textContent='⚠ Password min 4 chars!';return;}
  const allUsers=LS.get('rp_users',[]);
  const dup=allUsers.find(u=>u.username.toLowerCase()===username.toLowerCase()&&u.id!==STATE._userEditId);
  if(dup){errEl.textContent='⚠ Username already exists!';return;}

  else{LS.set('rp_users',[...allUsers,{id:uid(),displayName:name,username,password,role,companyId:STATE.user.companyId,contact:'',method:''}]);}
  cancelUserEdit();const ok=document.getElementById('ufOk');if(ok){ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);}
  renderUserSettings();

function saveProfile(){
  const name=document.getElementById('pf_name')?.value?.trim();
  const username=document.getElementById('pf_username')?.value?.trim();
  const pw=document.getElementById('pf_pw')?.value;const pw2=document.getElementById('pf_pw2')?.value;
  const errEl=document.getElementById('pfErr');
  if(!name||!username){errEl.textContent='⚠ Name aur username zaroori!';return;}
  if(pw&&pw.length<4){errEl.textContent='⚠ Password min 4 chars!';return;}
  if(pw&&pw!==pw2){errEl.textContent='⚠ Passwords match nahi!';return;}
  const allUsers=LS.get('rp_users',[]);
  const dup=allUsers.find(u=>u.username.toLowerCase()===username.toLowerCase()&&u.id!==STATE.user.id);
  if(dup){errEl.textContent='⚠ Username already exists!';return;}
  const update={...STATE.user,displayName:name,username};
  if(pw) update.password=pw;
  LS.set('rp_users',allUsers.map(u=>u.id===STATE.user.id?update:u));
  STATE.user=update;
  document.getElementById('userName').textContent=name;
  const av=document.getElementById('userAv');if(av) av.textContent=name.charAt(0).toUpperCase();

}

      </div>
      <div class="ob-btn-row"><button class="btn btn-primary full" onclick="STATE.obStep=1;renderOnboarding()">Next →</button></div>`,

    1:`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px">${STATE.obMethod==='email'?'Email Daalo':'Mobile Number Daalo'}</div>
      <div class="mb-16"><div class="fld-label">${STATE.obMethod==='email'?'Email Address':'Phone Number'}</div>
      <div class="inp-wrap"><span class="inp-icon">${STATE.obMethod==='email'?'📧':'📱'}</span><input class="inp" id="ob_contact" value="${STATE.obContact}" placeholder="${STATE.obMethod==='email'?'you@gmail.com':'+92-300-0000000'}" oninput="STATE.obContact=this.value"/></div></div>
      <div id="obErr1" class="err-msg mb-12"></div>
      <div class="ob-btn-row"><button class="btn btn-ghost" onclick="STATE.obStep=0;renderOnboarding()">← Back</button>
      <button class="btn btn-primary" style="flex:1" onclick="obSendOTP()">Send OTP 📤</button></div>`,

    2:`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px">OTP Verify Karo</div>
      <div style="background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);border-radius:9px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--g)">✅ Demo OTP alert mein show hua hai</div>
      <div class="mb-16"><div class="fld-label">6-Digit OTP</div><input class="inp mono" id="ob_otp" value="${STATE.obOTP}" placeholder="Enter OTP" style="text-align:center;font-size:20px;letter-spacing:6px" oninput="STATE.obOTP=this.value"/></div>
      <div id="obErr2" class="err-msg mb-12"></div>
      <div class="ob-btn-row"><button class="btn btn-ghost" onclick="STATE.obStep=1;renderOnboarding()">← Back</button>
      <button class="btn btn-primary" style="flex:1" onclick="obVerifyOTP()">Verify ✓</button></div>`,

    3:`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px">Company Setup Karo</div>
      <div class="mb-12">
        <div class="fld-label">Logo Icon</div>
        <div class="icon-picker mb-12">${ICONS.map(ic=>`<div class="icon-pick${STATE.obCompany.icon===ic?' selected':''}" onclick="STATE.obCompany.icon='${ic}';renderOnboarding()">${ic}</div>`).join('')}</div>
        <div class="fld-label">Brand Color</div>
        <div class="gap-8 mb-12">${COLORS.map(c=>`<div class="color-pick${STATE.obCompany.color===c?' selected':''}" style="background:${c};box-shadow:${STATE.obCompany.color===c?`0 0 8px ${c}`:''}" onclick="STATE.obCompany.color='${c}';renderOnboarding()"></div>`).join('')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid ${STATE.obCompany.color}35;background:${STATE.obCompany.color}08;margin-bottom:12px">
        <div style="width:34px;height:34px;border-radius:9px;background:${STATE.obCompany.color}20;border:1.5px solid ${STATE.obCompany.color}45;display:flex;align-items:center;justify-content:center;font-size:17px">${STATE.obCompany.icon}</div>
        <div><div style="font-size:14px;font-weight:800;color:var(--text)">${STATE.obCompany.name||'Company Name'}</div><div style="font-size:11px;color:var(--sub)">${STATE.obCompany.tagline||'Tagline'}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div><div class="fld-label">Company Name *</div><input class="inp" id="ob_cname" value="${STATE.obCompany.name}" placeholder="Al-Barkat Foods" oninput="STATE.obCompany.name=this.value;renderOnboarding()"/></div>
        <div><div class="fld-label">Tagline</div><input class="inp" id="ob_ctag" value="${STATE.obCompany.tagline}" placeholder="Quality Since 1998" oninput="STATE.obCompany.tagline=this.value"/></div>
        <div><div class="fld-label">City</div><input class="inp" id="ob_ccity" value="${STATE.obCompany.city}" placeholder="Karachi" oninput="STATE.obCompany.city=this.value"/></div>
        <div><div class="fld-label">Industry</div><select class="inp" onchange="STATE.obCompany.industry=this.value"><option>Food Processing</option><option>Canned Foods</option><option>Fish Processing</option><option>Dairy</option><option>Other</option></select></div>
      </div>
      <div id="obErr3" class="err-msg mb-12"></div>
      <div class="ob-btn-row"><button class="btn btn-ghost" onclick="STATE.obStep=2;renderOnboarding()">← Back</button>
      <button class="btn btn-primary" style="flex:1" onclick="obSaveCompany()">Next →</button></div>`,

    4:`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px">Owner Account Banao</div>
      <div style="padding:8px 12px;border-radius:9px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);margin-bottom:14px;font-size:12px;color:var(--gold)">👑 Owner ko sabse zyada access milega</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div><div class="fld-label">Aapka Naam *</div><input class="inp" id="ob_oname" value="${STATE.obOwner.name}" placeholder="Ahmed Khan" oninput="STATE.obOwner.name=this.value"/></div>
        <div><div class="fld-label">Username *</div><input class="inp" id="ob_ousername" value="${STATE.obOwner.username}" placeholder="ahmed.khan" oninput="STATE.obOwner.username=this.value"/></div>
        <div><div class="fld-label">Password *</div><input class="inp" id="ob_opassword" type="password" value="${STATE.obOwner.password}" placeholder="Min 6 chars" oninput="STATE.obOwner.password=this.value"/></div>
        <div><div class="fld-label">Confirm Password *</div><input class="inp" id="ob_oconfirm" type="password" placeholder="Dobara daalo"/></div>
      </div>
      <div id="obErr4" class="err-msg mb-12"></div>
      <div class="ob-btn-row"><button class="btn btn-ghost" onclick="STATE.obStep=3;renderOnboarding()">← Back</button>
      <button class="btn btn-gold" style="flex:1" onclick="obFinish()">🚀 Launch System!</button></div>`,
  };
  document.getElementById('obContent').innerHTML=content[STATE.obStep]||'';
}
function obSendOTP(){
  const c=STATE.obContact;
  if(!c){document.getElementById('obErr1').textContent='⚠ Contact daalo!';return;}
  const code=Math.floor(100000+Math.random()*900000).toString();
  STATE.obSentOTP=code;STATE.obStep=2;renderOnboarding();
  setTimeout(()=>alert(`📱 Demo OTP: ${code}\n(Real app mein ${STATE.obMethod==='email'?'email':'SMS'} aayega)`),100);
}
function obVerifyOTP(){
  if(STATE.obOTP===STATE.obSentOTP){STATE.obStep=3;renderOnboarding();}
  else{document.getElementById('obErr2').textContent='⚠ Galat OTP!';}
}
function obSaveCompany(){
  if(!STATE.obCompany.name.trim()){document.getElementById('obErr3').textContent='⚠ Company name zaroori!';return;}
  STATE.obStep=4;renderOnboarding();
}
function obFinish(){
  const {name,username,password}=STATE.obOwner;
  const confirm=document.getElementById('ob_oconfirm')?.value;
  const errEl=document.getElementById('obErr4');
  if(!name||!username){errEl.textContent='⚠ Naam aur username zaroori!';return;}
  if(password.length<6){errEl.textContent='⚠ Password min 6 chars!';return;}
  if(password!==confirm){errEl.textContent='⚠ Passwords match nahi!';return;}
  const cid=uid();
  const co={id:cid,...STATE.obCompany};
  const u={id:uid(),username,password,displayName:name,role:'Owner',contact:STATE.obContact,method:STATE.obMethod,companyId:cid};
  LS.set('rp_companies',[...LS.get('rp_companies',[]),co]);
  LS.set('rp_users',[...LS.get('rp_users',[]),u]);
  STATE.user=u;STATE.company=co;
  STATE.batches=LS.get(`rp_bat_${cid}`,DEF_BATCHES);
  STATE.ranges=LS.get(`rp_rng_${cid}`,DEF_RANGES);
  STATE.plan=LS.get('rp_plan','pro');
  initApp();showPage('app');navigate('dashboard');
}

// ═══════════════════════════════════════════
//  START
// ═══════════════════════════════════════════
init();
</script>
</body>
</html>
